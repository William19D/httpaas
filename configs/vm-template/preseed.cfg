#### HTTPaaS - Debian 13 preseed para instalación desatendida ####
# Genera la VM plantilla (httpaas-template) sin intervención manual.
# Se sirve por HTTP local durante setup-template-vm.sh.
# Idioma y región -- ajustar si se prefiere
d-i debian-installer/locale string es_CO.UTF-8
d-i debian-installer/language string es
d-i debian-installer/country  string CO
d-i keyboard-configuration/xkb-keymap select latam

# Red por DHCP (NAT de VirtualBox la entrega).
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string httpaas-template
d-i netcfg/get_domain   string cloud.local

# Réplica APT
d-i mirror/country string CO
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Habilitar contrib y non-free (necesario para virtualbox-guest-utils)
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true

# Reloj
d-i clock-setup/utc boolean true
d-i time/zone string America/Bogota
d-i clock-setup/ntp boolean true

# Particionado: un solo disco, todo en /, sin swap (la VM tiene 768MB).
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Usuario "cloud" con contraseña "cloud" (se cambiará por llave SSH).
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Cloud User
d-i passwd/username string cloud
d-i passwd/user-password password cloud
d-i passwd/user-password-again password cloud

# Selección de paquetes mínima en CLI.
# Nota: virtualbox-guest-utils se instala en Phase B (requiere contrib).
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo curl ca-certificates unzip apache2 \
    systemd-resolved systemd-timesyncd less vim-tiny
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# GRUB
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/sda

# Apagar tras instalar (la webapp Go recogerá la VM apagada).
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean true

# Comando post-instalación: configura sudo sin contraseña para cloud.
d-i preseed/late_command string \
    in-target sh -c "echo 'cloud ALL=(ALL) NOPASSWD: ALL' >/etc/sudoers.d/90-cloud" ; \
    in-target sh -c "chmod 440 /etc/sudoers.d/90-cloud" ; \
    in-target sh -c "mkdir -p /home/cloud/.ssh && chmod 700 /home/cloud/.ssh" ; \
    in-target sh -c "chown -R cloud:cloud /home/cloud/.ssh" ; \
    in-target sh -c "echo 'deb http://deb.debian.org/debian trixie contrib non-free non-free-firmware' >> /etc/apt/sources.list"
