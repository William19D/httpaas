# =============================================================
# HTTPaaS - VirtualHost por defecto
# =============================================================
# Este archivo se copia en /etc/apache2/sites-available/ dentro
# de la VM plantilla. Sirve cualquier sitio depositado en
# /var/www/html/ y registra accesos/errores por instancia.
#
# El first-boot script reescribe ServerName con el hostname real
# antes de habilitar el sitio, así Apache reporta correctamente.
# =============================================================

<VirtualHost *:80>
    # ServerName se sobreescribe en primer arranque por first-boot.sh.
    ServerName  __HOSTNAME__.cloud.local
    ServerAdmin webmaster@cloud.local

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logs por instancia. CombinedFormat agrega referer y user-agent.
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Cabecera que identifica a la instancia (útil para depurar el balanceador imaginario).
    Header always set X-HTTPaaS-Instance "__HOSTNAME__"
</VirtualHost>
